<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .pro-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      background: #0057b8;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      transition: 0.2s;
    }

    .pro-btn:hover {
      background: #0b82ff;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    .icon {
      font-size: 20px;
    }
  </style>
</head>
<body>

<a class="pro-btn" href="https://wischhusenhaustechnik.sharepoint.com/sites/techniker/SitePages/TechnikerDashboard.aspx">
  <span class="icon">🛠️</span>
  Techniker Dashboard
</a>

</body>
</html>
